<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="OT Threat Feed">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37838f"/>
      <stop offset="1" stop-color="#1f5a63"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- shield -->
  <path d="M16 3.4 27 7.6 V15.2 C27 22 22.4 27 16 29 10.4 27 5 22 5 15.2 V7.6 Z"
        fill="#ffffff"/>
  <!-- radar rings inside the shield -->
  <g fill="none" stroke="#2c7480" stroke-width="1.7">
    <circle cx="16" cy="15.3" r="7.1"/>
    <circle cx="16" cy="15.3" r="3.7"/>
  </g>
  <!-- radar sweep wedge -->
  <path d="M16 15.3 L23.1 15.3 A7.1 7.1 0 0 0 20.6 9.8 Z" fill="#2c7480" opacity="0.16"/>
  <!-- center + detected blip -->
  <circle cx="16" cy="15.3" r="1.5" fill="#2c7480"/>
  <circle cx="20.7" cy="10.9" r="2" fill="#e0701a"/>
</svg>
